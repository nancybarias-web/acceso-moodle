<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Acceso Moodle - TMyEaD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        body {
            background-color: #f3f4f6;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-morphism rounded-2xl shadow-2xl p-8 transition-all duration-300">
        <!-- Encabezado -->
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Acceso TMyEaD</h1>
            <p class="text-gray-500 mt-2">Consulta tu usuario y contraseña de Moodle</p>
        </div>

        <!-- Formulario de Búsqueda -->
        <div class="space-y-4">
            <div>
                <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-1">Apellido o Correo Electrónico</label>
                <div class="relative">
                    <input type="text" id="searchInput" 
                           placeholder="Ej: Castro o patricia@..."
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all pl-11">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
            
            <button onclick="buscarUsuario()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2">
                <span>Buscar Credenciales</span>
            </button>
        </div>

        <!-- Área de Resultados -->
        <div id="resultArea" class="mt-8 hidden fade-in">
            <div class="border-t pt-6">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Información Encontrada</h3>
                
                <div class="space-y-3">
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <p class="text-xs text-gray-500 mb-1">Nombre Completo</p>
                        <p id="resFullName" class="font-medium text-gray-800">-</p>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <p class="text-xs text-blue-600 font-bold mb-1 uppercase">Nombre de usuario (Columna C)</p>
                            <div class="flex justify-between items-center">
                                <p id="resUsername" class="text-lg font-mono font-bold text-blue-800">-</p>
                                <button onclick="copyText('resUsername')" class="text-blue-400 hover:text-blue-600 transition-colors">
                                    <i class="far fa-copy"></i>
                                </button>
                            </div>
                        </div>

                        <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                            <p class="text-xs text-green-600 font-bold mb-1 uppercase">Contraseña (Columna G)</p>
                            <div class="flex justify-between items-center">
                                <p id="resPassword" class="text-lg font-mono font-bold text-green-800">-</p>
                                <button onclick="copyText('resPassword')" class="text-blue-400 hover:text-blue-600 transition-colors">
                                    <i class="far fa-copy"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mensaje de Error -->
        <div id="errorArea" class="mt-6 hidden">
            <div class="bg-red-50 text-red-700 p-4 rounded-xl flex items-center gap-3 border border-red-100">
                <i class="fas fa-exclamation-circle text-lg"></i>
                <p class="text-sm">No se encontraron registros. Verifica que el apellido o correo sea correcto.</p>
            </div>
        </div>

        <div class="mt-8 text-center text-xs text-gray-400">
            <p>© 2024 Formulario de Inscripción TMyEaD</p>
        </div>
    </div>

    <script>
        // Datos sincronizados con el CSV cargado originalmente
        const userData = [
            {"lastname": "Castro", "firstname": "Patricia Inés", "username": "33762445", "email": "patriciainescastro27@gmail.com", "password": "Saa_33762445"},
            {"lastname": "Szpiczak", "firstname": "MARIA CRISTINA", "username": "21912993", "email": "cristina_ma_sz@hotmail.com", "password": "Saa_21912993"},
            {"lastname": "Navas Montes", "firstname": "Yonaiker", "username": "0960253284", "email": "ynavas@ueb.edu.ec", "password": "Saa_0960253284"},
            {"lastname": "Weisz", "firstname": "Rosa María", "username": "22198173", "email": "rosa.weisz@uner.edu.ar", "password": "Saa_22198173"},
            {"lastname": "Triminio Lopez", "firstname": "Henry Mauricio", "username": "0701197814484", "email": "henry.triminio@unah.edu.hn", "password": "Saa_0701197814484"},
            {"lastname": "Tandetzki", "firstname": "Georgina Adriana", "username": "22342994", "email": "gigi.tande@gmail.com", "password": "Saa_22342994"},
            {"lastname": "Coba Torres", "firstname": "Rommel Sebastian", "username": "1723003354", "email": "rcoba@ueb.edu.ec", "password": "Saa_1723003354"},
            {"lastname": "Duedra", "firstname": "Julieta", "username": "0933111213", "email": "julieta.duedra@gmail.com", "password": "Saa_0933111213"},
            {"lastname": "Uhrich Medina", "firstname": "Indiana Fabricia", "username": "37080731", "email": "indiana.uhrichmedina@uner.edu.ar", "password": "Saa_37080731"},
            {"lastname": "MONGE AMORES", "firstname": "LOURDES ELENA", "username": "ci0501377469", "email": "emonge@udet.edu.ec", "password": "Saa_ci0501377469"},
            {"lastname": "Benitez", "firstname": "Melina Abigail", "username": "43293233", "email": "migiame2018@gmail.com", "password": "Saa_43293233"},
            {"lastname": "Pérez Moreno", "firstname": "Elena Silvia", "username": "18177289", "email": "elena.perez.moreno.289@unc.edu.ar", "password": "Saa_18177289"},
            {"lastname": "Tapia Kwiecien", "firstname": "Martín", "username": "28654815", "email": "martin.tapia.kwiecien@unc.edu.ar", "password": "Saa_28654815"},
            {"lastname": "Sotelo", "firstname": "Eva", "username": "29135476", "email": "esotelo@unc.edu.ar", "password": "Saa_29135476"}
        ];

        function buscarUsuario() {
            const input = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultArea = document.getElementById('resultArea');
            const errorArea = document.getElementById('errorArea');

            if (!input) {
                resultArea.classList.add('hidden');
                errorArea.classList.add('hidden');
                return;
            }

            // Normalización para evitar errores por espacios en los datos fuente
            const user = userData.find(u => {
                const searchLname = u.lastname.trim().toLowerCase();
                const searchEmail = u.email.trim().toLowerCase();
                return searchLname.includes(input) || searchEmail === input;
            });

            if (user) {
                document.getElementById('resFullName').innerText = `${user.lastname}, ${user.firstname}`;
                document.getElementById('resUsername').innerText = user.username;
                document.getElementById('resPassword').innerText = user.password;
                
                resultArea.classList.remove('hidden');
                errorArea.classList.add('hidden');
            } else {
                resultArea.classList.add('hidden');
                errorArea.classList.remove('hidden');
            }
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check text-green-500"></i>';
            setTimeout(() => btn.innerHTML = originalHTML, 2000);
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarUsuario();
        });
    </script>
</body>
</html>
