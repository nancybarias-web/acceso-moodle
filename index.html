<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta de Acceso al Curso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .logo svg {
      width: 48px;
      height: 48px;
    }

    h1 {
      text-align: center;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: -0.3px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.75);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.2rem;
    }

    .input-group svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.75rem;
      color: #fff;
      font-size: 0.95rem;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.25); }

    input:focus {
      border-color: #4e8ef7;
      background: rgba(78,142,247,0.1);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .divider span {
      color: rgba(255,255,255,0.3);
      font-size: 0.75rem;
      font-weight: 600;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #4e8ef7, #7c5cfc);
      border: none;
      border-radius: 0.75rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.3rem;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }

    /* Result card */
    #result {
      display: none;
      margin-top: 1.5rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1rem;
      padding: 1.25rem 1.25rem 1rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #result.error {
      border-color: rgba(255, 80, 80, 0.4);
      background: rgba(255, 80, 80, 0.06);
    }

    #result.error .result-title {
      color: #ff7070;
    }

    .result-title {
      color: #7cc8ff;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 0.75rem;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .result-row:last-child { border-bottom: none; }

    .result-label {
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem;
    }

    .result-value {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .copy-btn {
      width: auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.4rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      margin-top: 0;
      letter-spacing: 0;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
      opacity: 1;
    }

    .copy-btn:active { transform: scale(0.95); }

    .multiple-notice {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-top: 0.75rem;
    }

    /* Navigation arrows for multiple results */
    .nav-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .nav-btn {
      width: auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.5rem;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      margin-top: 0;
      letter-spacing: 0;
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .nav-counter {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

      <span class="nav-counter" id="nav-counter"></span>

</div>

,{"lastname":"Cachagua Ibañez ","email":"silvia.cachagua@unc.edu.ar","username":"23946124","password":"Saa_23946124"},{"lastname":"González Amagua","email":"jegonzalez@udet.edu.ec","username":"1711840403","password":"Saa_1711840403"},{"lastname":"Foti ","email":"malenafoti23@gmail.com","username":"40702933","password":"Saa_40702933"},{"lastname":"Gomez","email":"briankaquin@gmail.com","username":"38516542","password":"Saa_38516542"},{"lastname":"Caballero Albarado","email":"lucas.caballero@uner.edu.ar","username":"35441734","password":"Saa_35441734"},{"lastname":"Laurens","email":"denise.laurens@uner.edu.ar","username":"31918358","password":"Saa_31918358"},{"lastname":"Bertona","email":"vanina.bertona@uner.edu.ar","username":"27320320","password":"Saa_27320320"}];

let matches = [];
let currentIndex = 0;

function normalize(str) {
  return (str || '').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function buscar() {
  const apellido = document.getElementById('apellido').value.trim();
  const correo   = document.getElementById('correo').value.trim();
  const result   = document.getElementById('result');

  if (!apellido && !correo) {
    showError('Por favor ingresá tu apellido o correo electrónico.');
    return;
  }

  matches = DATA.filter(row => {
    if (correo) {
      return normalize(row.email) === normalize(correo);
    }
    return normalize(row.lastname).includes(normalize(apellido));
  });

  // Deduplicate by username
  const seen = new Set();
  matches = matches.filter(r => {
    if (seen.has(r.username)) return false;
    seen.add(r.username);
    return true;
  });

  if (matches.length === 0) {
    showError('No se encontraron resultados. Verificá los datos ingresados.');
    return;
  }

  currentIndex = 0;
  showResult();
}

function showResult() {
  const result = document.getElementById('result');
  const body   = document.getElementById('result-body');
  const nav    = document.getElementById('nav-controls');
  const title  = document.getElementById('result-title');

  result.className = '';
  result.style.display = 'block';
  title.textContent = matches.length > 1
    ? `Resultado ${currentIndex + 1} de ${matches.length}`
    : 'Tus credenciales';

  const m = matches[currentIndex];
  body.innerHTML = `
    <div class="result-row">
      <span class="result-label">Usuario</span>
      <span class="result-value">
        <span id="val-user">${m.username}</span>
        <button class="copy-btn" onclick="copyVal('val-user', this)">Copiar</button>
      </span>
    </div>
    <div class="result-row">
      <span class="result-label">Contraseña</span>
      <span class="result-value">
        <span id="val-pass">${m.password}</span>
        <button class="copy-btn" onclick="copyVal('val-pass', this)">Copiar</button>
      </span>
    </div>
  `;

  if (matches.length > 1) {
    nav.style.display = 'flex';
    document.getElementById('nav-counter').textContent = `${currentIndex + 1} / ${matches.length}`;
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').disabled = currentIndex === matches.length - 1;
  } else {
    nav.style.display = 'none';
  }
}

function navResult(dir) {
  currentIndex = Math.max(0, Math.min(matches.length - 1, currentIndex + dir));
  showResult();
}

function showError(msg) {
  const result = document.getElementById('result');
  const body   = document.getElementById('result-body');
  const title  = document.getElementById('result-title');
  const nav    = document.getElementById('nav-controls');

  result.className = 'error';
  result.style.display = 'block';
  nav.style.display = 'none';
  title.textContent = 'Sin resultados';
  body.innerHTML = `<p style="color:rgba(255,255,255,0.6);font-size:0.9rem;padding:0.25rem 0">${msg}</p>`;
}

function copyVal(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// Allow Enter key on inputs
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') buscar();
});
